<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>

  </head>
  <body>

      <div class="bg-white dark:bg-gray-800 rounded-lg px-6 py-8 ring shadow-xl ring-gray-900/5">
  <div>
    <span class="inline-flex items-center justify-center rounded-md bg-indigo-500 p-2 shadow-lg">
      <svg class="h-6 w-6 stroke-white" ...>
        </svg>
    </span>
  </div>
  <h3 class="text-gray-900 dark:text-white mt-5 text-base font-medium tracking-tight">Writes upside-down</h3>
  <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">
    The Zero Gravity Pen can be used to write in any orientation, including upside-down. It even works in outer space.
  </p>
</div>

<button class="ring-1 rounded-2xl bg-gray-700 text-white p-4" onclick="DarkMode()">🌚 Dark Mode</button>
<button class="ring-1 rounded-2xl bg-yellow-700 text-white p-4" onclick="LightMode()">🤩 Light Mode</button>

<script>
  // 1. On page load, set the correct theme
  if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }

  // 2. Light Mode function
  function LightMode() {
    document.documentElement.classList.remove('dark');
    localStorage.theme = 'light';
  }

  // 3. Dark Mode function
  function DarkMode() {
    document.documentElement.classList.add('dark');
    localStorage.theme = 'dark';
  }
</script>

<script>
  tailwind = { config: { darkMode: 'class' } }
</script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     
  </body>
</html>

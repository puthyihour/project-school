<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/output.css">
</head>
<body>
    <div class="bg-white dark:bg-gray-800 rounded-lg px-6 py-8 ring shadow-xl ring-gray-900/5">
  <div>
    <span class="inline-flex items-center justify-center rounded-md bg-indigo-500 p-2 shadow-lg">
      <svg class="h-6 w-6 stroke-white" ...>
        </svg>
    </span>
  </div>
  <h3 class="text-gray-900 dark:text-white mt-5 text-base font-medium tracking-tight">Writes upside-down</h3>
  <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">
    The Zero Gravity Pen can be used to write in any orientation, including upside-down. It even works in outer space.
  </p>
</div>

<button class="ring-1 rounded-2xl bg-gray-700 text-white p-4" onclick="DarkMode()">🌚 Dark Mode</button>
<button class="ring-1 rounded-2xl bg-yellow-700 text-white p-4" onclick="LightMode()">🌞 Light Mode</button>
<script>
  document.documentElement.classList.toggle(
    "dark",
    localStorage.theme === "dark" ||
    (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches),
  );

  // function for lightmode
  function LightMode() {
    document.documentElement.classList.remove("dark");
    localStorage.theme = "light";
  }

  // function for darkmode
  function DarkMode() {
    document.documentElement.classList.add("dark");
    localStorage.theme = "dark";
  }
</script>
</body>
</html>
